name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS, Xcode)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        id: test
        run: swift test --parallel

      # Snapshot tests use record: .all — PNGs always written; Argos owns visual diffing.
      - name: Setup pnpm
        if: always()
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Upload snapshots to Argos
        if: always()
        env:
          ARGOS_TOKEN: ${{ secrets.ARGOS_TOKEN }}
        run: pnpm dlx @argos-ci/cli@5.0.3 upload --token "$ARGOS_TOKEN" Tests/getupTests/Snapshots/__Snapshots__

      - name: Assemble app bundle
        env:
          REDEPLOY: "0" # don't try to copy to ~/Applications or kickstart launchd on CI
        run: ./build.sh

      - name: Sanity-check bundle layout
        run: |
          test -x getup.app/Contents/MacOS/getup
          test -f getup.app/Contents/Info.plist
          test -f getup.app/Contents/PkgInfo
          # Every locale we ship must land in the bundle.
          for L in de el en es fr it ja pt-BR ru zh-Hans; do
            test -f "getup.app/Contents/Resources/${L}.lproj/Localizable.strings" \
              || { echo "missing locale: ${L}"; exit 1; }
          done
          echo "Bundle OK"
