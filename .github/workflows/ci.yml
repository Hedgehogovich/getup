name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (macOS, Xcode)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcode-select -p
          xcodebuild -version
          swift --version

      - name: Build (release)
        run: swift build -c release

      - name: Test
        id: test
        run: swift test --parallel

      # Snapshot lib writes recorded PNGs to <test-file-dir>/__Snapshots__/ on missing-baseline
      # failure. Uploading on test-step failure lets the dev download, eyeball, commit, re-push.
      - name: Upload snapshot artifacts on failure
        if: failure() && steps.test.conclusion == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: snapshot-baselines
          path: |
            Tests/getupTests/**/__Snapshots__/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Assemble app bundle
        env:
          REDEPLOY: "0" # don't try to copy to ~/Applications or kickstart launchd on CI
        run: ./build.sh

      - name: Sanity-check bundle layout
        run: |
          test -x getup.app/Contents/MacOS/getup
          test -f getup.app/Contents/Info.plist
          test -f getup.app/Contents/PkgInfo
          # Every locale we ship must land in the bundle.
          for L in de el en es fr it ja pt-BR ru zh-Hans; do
            test -f "getup.app/Contents/Resources/${L}.lproj/Localizable.strings" \
              || { echo "missing locale: ${L}"; exit 1; }
          done
          echo "Bundle OK"
